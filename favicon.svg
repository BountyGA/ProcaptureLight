<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded square background with camera lens design -->
  <rect width="512" height="512" rx="128" fill="#09090b" stroke="#eab308" stroke-width="12" />
  
  <!-- Outer metallic-like lens ring -->
  <circle cx="256" cy="256" r="160" fill="#18181b" stroke="#27272a" stroke-width="4" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#eab308" stroke-width="8" stroke-dasharray="16 12" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#ffffff" stroke-dasharray="4" stroke-width="1.5" />

  <!-- Inner lens glass -->
  <circle cx="256" cy="256" r="110" fill="#09090b" stroke="#ffffff" stroke-width="6" />
  
  <!-- Camera lens glass reflections/glare -->
  <path d="M 200 170 A 90 90 0 0 1 312 170" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" opacity="0.85" />
  <circle cx="340" cy="310" r="16" fill="#eab308" opacity="0.9" />
  <circle cx="310" cy="340" r="8" fill="#ffffff" opacity="0.7" />
  <circle cx="170" cy="256" r="22" fill="#ffffff" opacity="0.15" />

  <!-- Aperture blades effect -->
  <path d="M 256 146 L 210 210 M 256 366 L 302 302 M 146 256 L 210 302 M 366 256 L 302 210" stroke="#27272a" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
